<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Detail — HAK Engineering</title>
  <link rel="icon" href="https://www.hakeng.sa/favicon.ico" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">
    <img src="https://www.hakeng.sa/images/logo/HAK%20Logo-white.jpg" alt="HAK Engineering" height="32" style="display:block" />
  </a>
  <nav>
    <a href="/">All Requests</a>
    <a href="/create.html">New Request</a>
  </nav>
</nav>

<div class="page-sm">
  <div class="page-header">
    <div>
      <h1 id="pageTitle">Loading…</h1>
      <div class="sub" id="pageSub"></div>
    </div>
    <a href="/" class="btn btn-outline">← Back</a>
  </div>

  <div id="alertBox"></div>
  <div id="mainContent"></div>
</div>

<!-- Approve / Reject Modal -->
<div class="modal-overlay" id="actionModal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalSubtitle" style="font-size:.88rem;color:var(--muted);margin-bottom:14px"></p>
    <textarea id="modalComments" placeholder="Comments (optional)…"></textarea>
    <div class="modal-actions">
      <button class="btn btn-outline" id="modalCancelBtn">Cancel</button>
      <button class="btn" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  const currentUser = requireAuth();
  if (currentUser) injectUserNav();

  const requestId = new URLSearchParams(location.search).get('id');
  if (!requestId) $('#mainContent').html('<div class="alert alert-error">No request ID provided.</div>');

  let pendingApproverId = null;
  let pendingAction     = null;

  const statusClass   = { 'Draft':'badge-draft', 'Pending Approval':'badge-pending', 'Approved':'badge-approved', 'Rejected':'badge-rejected' };
  const priorityClass = { Low:'badge-low', Medium:'badge-medium', High:'badge-high' };
  const roleClass     = { Reviewer:'badge-reviewer', Approver:'badge-approver', Signatory:'badge-signatory' };
  const statusIcon    = { Pending:'🕐', Approved:'✅', Rejected:'❌' };

  function toast(msg, type = '') {
    $('#toast').attr('class', 'show' + (type ? ' toast-' + type : '')).text(msg);
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => $('#toast').attr('class', ''), 3500);
  }

  function fmtDate(d) {
    return d ? new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) : '—';
  }

  function fmtDateTime(d) {
    return d ? new Date(d).toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
  }

  // Laod & render
  async function load() {
    try {
      const res = await fetch(`/api/requests/${requestId}`);
      if (!res.ok) throw new Error((await res.json()).error);
      render(await res.json());
    } catch (e) {
      $('#mainContent').html(`<div class="alert alert-error">Failed to load: ${e.message}</div>`);
    }
  }

  function render(r) {
    $('#pageTitle').text(r.title);
    $('#pageSub').html(`
      <span class="badge ${statusClass[r.status] || ''}">${r.status}</span>
      &nbsp;<span class="badge ${priorityClass[r.priority] || ''}">${r.priority}</span>
      &nbsp;<span class="text-muted">${r.request_type}</span>
    `);

    const aging      = Math.max(0, Math.floor((Date.now() - new Date(r.created_at)) / 86400000));
    const approvers  = [...(r.approvers || [])].sort((a, b) => a.sequence - b.sequence);
    const currentApp = approvers.find(a => a.status === 'Pending');
    const isMyTurn   = currentApp && currentUser && String(currentApp.user_id) === String(currentUser.id);

    // Action banner
    let actionBar = '';
    if (r.status === 'Pending Approval' && currentApp) {
      actionBar = isMyTurn
        ? `<div class="card" style="background:#f0f6ff;border-color:var(--brand)">
             <div style="display:flex;gap:10px;flex-wrap:wrap">
               <button class="btn btn-success" id="approveBtn" data-id="${currentApp.id}">✓ Approve</button>
               <button class="btn btn-danger"  id="rejectBtn"  data-id="${currentApp.id}">✕ Reject</button>
             </div>
           </div>`
        : `<div class="alert alert-info">
             Waiting for <strong>${esc(currentApp.approver_name)}</strong> to act.
             
           </div>`;
    }

    // Approver chain
    const approverRows = approvers.map(a => {
      const isCurrent = a.id === currentApp?.id;
      const isMe      = currentUser && String(a.user_id) === String(currentUser.id);
      return `
        <div class="approver-row" style="${isCurrent ? 'border-color:var(--brand);background:#f0f6ff' : ''}">
          <div class="approver-seq" style="${a.status === 'Approved' ? 'background:var(--success)' : a.status === 'Rejected' ? 'background:var(--danger)' : ''}">${a.sequence}</div>
          <div class="approver-info">
            <div class="approver-name">
              ${esc(a.approver_name)}
              ${isCurrent ? '<span style="color:var(--brand);font-size:.78rem"> ← current</span>' : ''}
              ${isMe      ? '<span style="color:var(--success);font-size:.78rem"> (you)</span>'   : ''}
            </div>
            <div class="approver-email">${esc(a.approver_email)} · ${esc(a.approver_department || '')}</div>
            ${a.comments    ? `<div class="approver-comments">"${esc(a.comments)}"</div>` : ''}
            ${a.action_date ? `<div class="approver-comments">Acted: ${fmtDateTime(a.action_date)}</div>` : ''}
          </div>
          <span class="badge ${roleClass[a.role] || ''}">${a.role}</span>
          <span style="font-size:1.1rem">${statusIcon[a.status] || ''}</span>
          <span class="badge ${a.status === 'Approved' ? 'badge-approved' : a.status === 'Rejected' ? 'badge-rejected' : 'badge-pending'}">${a.status}</span>
        </div>`;
    }).join('') || '<p class="text-muted">No approvers assigned.</p>';

    // PDF row
    const pdfBlock = r.pdf_filename
      ? `<hr class="divider"/>
         <div style="display:flex;align-items:center;gap:12px">
           <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M5 2h9l5 5v13H5V2z" stroke="var(--danger)" stroke-width="1.8" stroke-linejoin="round"/><path d="M13 2v6h6" stroke="var(--danger)" stroke-width="1.8" stroke-linejoin="round"/></svg>
           <span style="font-size:.92rem">${esc(r.pdf_original_name)}</span>
           <a href="/api/requests/${r.id}/pdf" target="_blank" class="btn btn-outline btn-sm">View PDF</a>
         </div>`
      : '<p class="text-muted" style="margin-top:16px">No PDF attached.</p>';

    $('#mainContent').html(`
      ${actionBar}

      <div class="card">
        <div class="card-title">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="3" stroke="var(--brand)" stroke-width="1.8"/><path d="M5 6h8M5 9h8M5 12h5" stroke="var(--brand)" stroke-width="1.6" stroke-linecap="round"/></svg>
          Request Details
        </div>
        <div class="detail-grid">
          <div class="detail-field"><label>Title</label><div class="val">${esc(r.title)}</div></div>
          <div class="detail-field"><label>Type</label><div class="val">${esc(r.request_type)}</div></div>
          <div class="detail-field"><label>Requested By</label><div class="val">${esc(r.requested_by)}</div></div>
          <div class="detail-field"><label>Department</label><div class="val">${esc(r.department)}</div></div>
          <div class="detail-field"><label>Priority</label><div class="val"><span class="badge ${priorityClass[r.priority] || ''}">${r.priority}</span></div></div>
          <div class="detail-field"><label>Due Date</label><div class="val">${fmtDate(r.due_date)}</div></div>
          <div class="detail-field"><label>Created</label><div class="val">${fmtDateTime(r.created_at)}</div></div>
          <div class="detail-field"><label>Aging</label><div class="val" style="${aging > 7 ? 'color:var(--danger);font-weight:700' : ''}">${aging} day${aging !== 1 ? 's' : ''}</div></div>
          ${r.external_party_name    ? `<div class="detail-field"><label>External Party</label><div class="val">${esc(r.external_party_name)}</div></div>` : ''}
          ${r.external_party_contact ? `<div class="detail-field"><label>External Contact</label><div class="val">${esc(r.external_party_contact)}</div></div>` : ''}
          ${r.remarks ? `<div class="detail-field" style="grid-column:1/-1"><label>Remarks</label><div class="val">${esc(r.remarks)}</div></div>` : ''}
        </div>
        ${pdfBlock}
      </div>

      <div class="card">
        <div class="card-title">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="7" cy="6" r="3" stroke="var(--brand)" stroke-width="1.8"/><path d="M2 15c0-3 2.2-5 5-5s5 2 5 5" stroke="var(--brand)" stroke-width="1.8" stroke-linecap="round"/></svg>
          Approval Chain
        </div>
        ${approverRows}
      </div>
    `);
  }

  //  Approve / Reject buttons
  $('#mainContent').on('click', '#approveBtn, #rejectBtn', function () {
    const action = $(this).attr('id') === 'approveBtn' ? 'Approved' : 'Rejected';
    openModal($(this).data('id'), action);
  });

  //  Modal
  function openModal(approverId, action) {
    pendingApproverId = approverId;
    pendingAction     = action;

    const isApprove = action === 'Approved';
    $('#modalTitle').text(isApprove ? '✓ Approve Request' : '✕ Reject Request');
    $('#modalSubtitle').text(`Acting as ${currentUser?.name}`);
    $('#modalConfirmBtn')
      .attr('class', `btn ${isApprove ? 'btn-success' : 'btn-danger'}`)
      .text(isApprove ? 'Approve' : 'Reject');
    $('#modalComments').val('');
    $('#actionModal').addClass('open');
  }

  function closeModal() {
    $('#actionModal').removeClass('open');
    pendingApproverId = null;
    pendingAction     = null;
  }

  $('#modalCancelBtn').on('click', closeModal);

  $('#actionModal').on('click', function (e) {
    if ($(e.target).is('#actionModal')) closeModal();
  });

  $('#modalConfirmBtn').on('click', async function () {
    const $btn = $(this).prop('disabled', true);

    const res  = await fetch(`/api/requests/approve/${pendingApproverId}`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        user_id:  currentUser.id,
        action:   pendingAction,
        comments: $('#modalComments').val().trim(),
      }),
    });
    const data = await res.json();
    $btn.prop('disabled', false);

    if (!res.ok) { toast(data.error, 'error'); return; }
    closeModal();
    toast(data.message, 'success');
    setTimeout(load, 600);
  });

  load();
</script>
</body>
</html>
